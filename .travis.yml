dist: focal
language: minimal

install: sudo apt-get update && sudo apt upgrade -y && sudo apt install ruby -y && sudo gem install nokogiri && sudo apt-get install -y dnsmasq-base ebtables libvirt-dev qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils qemu-utils ruby-dev && wget -nv https://releases.hashicorp.com/vagrant/2.2.7/vagrant_2.2.7_x86_64.deb && sudo dpkg -i vagrant_2.2.7_x86_64.deb && vagrant --version && vagrant plugin install vagrant-libvirt

script:
  - vagrant up --provider=libvirt
  - vagrant ssh -c "echo 'hello world!' && ls"

---
dist: bionic
language: minimal

install: sudo apt-get update && \
  sudo apt-get install -y \
    bridge-utils dnsmasq-base ebtables libvirt-bin libvirt-dev qemu-kvm qemu-utils ruby-dev && \
  wget -nv https://releases.hashicorp.com/vagrant/2.2.7/vagrant_2.2.7_x86_64.deb && \
  sudo dpkg -i vagrant_2.2.7_x86_64.deb && \
  vagrant --version && \
  vagrant plugin install vagrant-libvirt

script:
  - vagrant up --provider=libvirt
  - vagrant ssh -c "echo 'hello world!' && ls"
 - hosts: lan
   any_errors_fatal: true
   become: true
   pre_tasks:
     - name: Atualizar repositórios
       apt:
         update_cache: yes
       changed_when: False
   tasks:
     - include: tasks/packages.yml
     - include: tasks/users.yml
     - include: tasks/cron.yml
   roles: 
    - { role: prepare }
    - { role: wireguard }
